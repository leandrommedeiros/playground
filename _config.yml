# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Leandro Medeiros' Pages Playground
email: leandro.m.medeiros@me.com
description: >-
  Playground repository for publishing web pages.

baseurl: "/playground"
url: "https://leandrommedeiros.github.io"
twitter_username: myselfLeandro
github_username: leandrommedeiros

# Build settings
# theme: minima
# theme: minimal-mistakes-jekyll
remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: "air"

#remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-include-cache

show_downloads: false

github:
  is_project_page: false

# The theme is installed as a gem (see Gemfile); `vendor/minimal-mistakes` is only
# kept around as a local reference copy of the theme's source and must not be
# built as site content.
exclude:
  - vendor

# Markdown Processing (kramdown auto_ids are required for the sticky TOC
# used on the euro-road-trip pages to generate in-page anchor links)
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true

# Defaults
defaults:
  # Euro Road Trip standalone project pages
  - scope:
      path: "euro-road-trip"
      type: pages
    values:
      layout: single
      sidebar:
        nav: "euro-road-trip"
      toc: true
      toc_sticky: true
  # KatuOS documentation pages
  - scope:
      path: "katu-os"
      type: pages
    values:
      layout: single
      sidebar:
        nav: "katu-os"
      toc: true
      toc_sticky: true
